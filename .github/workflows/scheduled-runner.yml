name: Scheduled Export Runner

on:
  schedule:
    # Cron format: minute hour day-of-month month day-of-week
    #   minute:       0–59   (*/5 = every 5 minutes — minimum GitHub allows)
    #   hour:         0–23
    #   day-of-month: 1–31
    #   month:        1–12
    #   day-of-week:  0–6    (0 = Sunday)
    #
    # Examples:
    #   "*/5 * * * *"   → every 5 minutes
    #   "*/15 * * * *"  → every 15 minutes
    #   "0 * * * *"     → every hour (on the hour)
    #   "0 */2 * * *"   → every 2 hours
    #   "0 8 * * 1-5"   → weekdays at 08:00
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  trigger-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduled-runner endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-runner-key: ${{ secrets.SCHEDULE_RUNNER_KEY }}" \
            "${{ secrets.SWA_URL }}/api/scheduled-runner")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::Runner returned $http_code"
            exit 1
          fi
