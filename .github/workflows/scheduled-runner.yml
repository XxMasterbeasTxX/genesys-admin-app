name: Scheduled Export Runner

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  trigger-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduled-runner endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-runner-key: ${{ secrets.SCHEDULE_RUNNER_KEY }}" \
            "${{ secrets.SWA_URL }}/api/scheduled-runner")
          echo "HTTP status: $response"
          if [ "$response" -ge 500 ]; then
            echo "::error::Runner returned $response"
            exit 1
          fi
